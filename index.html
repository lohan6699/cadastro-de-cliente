<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Cliente</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: white;
      padding: 24px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .form-container {
      padding: 32px 28px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-weight: 500;
      font-size: 0.95rem;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .row > div {
      flex: 1;
    }

    .gender-group {
      display: flex;
      gap: 24px;
      margin-top: 8px;
    }

    .gender-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.25s;
    }

    button:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 0.9rem;
      border-top: 1px solid #f3f4f6;
    }

    @media (max-width: 480px) {
      .row {
        flex-direction: column;
        gap: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Cadastro de Cliente</h1>
      <p>Preencha os dados corretamente</p>
    </div>

    <div class="form-container">
      <form action="" method="post" id="cadastro-form">

        <div class="form-group">
          <label for="nome">Nome completo *</label>
          <input type="text" id="nome" name="nome" required placeholder="Ex: João Silva Santos">
        </div>

        <div class="row">
          <div class="form-group">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00" maxlength="14">
          </div>
          
          <div class="form-group">
            <label for="nascimento">Data de nascimento *</label>
            <input type="date" id="nascimento" name="nascimento" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">E-mail *</label>
          <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com">
        </div>

        <div class="row">
          <div class="form-group">
            <label for="telefone">Telefone / WhatsApp *</label>
            <input type="tel" id="telefone" name="telefone" required placeholder="(41) 99999-9999" maxlength="15">
          </div>

          <div class="form-group">
            <label for="genero">Gênero</label>
            <div class="gender-group">
              <label><input type="radio" name="genero" value="M"> Masculino</label>
              <label><input type="radio" name="genero" value="F"> Feminino</label>
              <label><input type="radio" name="genero" value="O"> Outro</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="estado">Estado onde reside</label>
          <select id="estado" name="estado">
            <option value="">Selecione...</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <!-- ... demais estados ... -->
            <option value="PR" selected>Paraná</option>
            <!-- ... -->
            <option value="SP">São Paulo</option>
          </select>
        </div>

        <button type="submit">Cadastrar Cliente</button>
      </form>
    </div>

    <div class="footer">
      Sistema de Cadastro • © 2025
    </div>
  </div>

</body>
</html>
