<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Cliente</title>
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1f2937;
    }
    .container {
      background: white;
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    .header {
      background: #4f46e5;
      color: white;
      padding: 28px 24px;
      text-align: center;
    }
    .header h1 { font-size: 2rem; margin-bottom: 8px; }
    .header p { opacity: 0.92; font-size: 1rem; }
    
    .form-container { padding: 32px 28px; }
    .form-group { margin-bottom: 24px; position: relative; }
    label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-weight: 500;
      font-size: 0.95rem;
    }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
      transform: translateY(-1px);
    }
    .error {
      color: #dc2626;
      font-size: 0.84rem;
      margin-top: 6px;
      display: block;
      min-height: 1.2em;
    }
    .success-msg, .error-msg {
      padding: 16px;
      margin: 20px 0;
      border-radius: 10px;
      text-align: center;
      font-weight: 500;
    }
    .success-msg { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .error-msg   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .gender-group {
      display: flex;
      flex-wrap: wrap;
      gap: 24px 32px;
      margin-top: 10px;
    }
    .gender-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 400;
      cursor: pointer;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.25s;
    }
    button:hover:not(:disabled) {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79,70,229,0.3);
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .lgpd-label {
      font-size: 0.92rem;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 8px;
    }
    .lgpd-label a { color: #4f46e5; text-decoration: underline; }
    .footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 0.9rem;
      border-top: 1px solid #f3f4f6;
      background: #f9fafb;
    }
    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; gap: 24px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Cadastro de Cliente</h1>
      <p>Preencha os dados com atenção</p>
    </div>

    <div class="form-container">
      <form id="cadastro-form" novalidate>

        <div class="form-group">
          <label for="nome">Nome completo <span aria-hidden="true">*</span></label>
          <input type="text" id="nome" name="nome" required minlength="3" placeholder="Ex: Maria Oliveira Santos" aria-describedby="erro-nome">
          <span class="error" id="erro-nome" aria-live="polite"></span>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="cpf">CPF <span aria-hidden="true">*</span></label>
            <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00" maxlength="14" inputmode="numeric" aria-describedby="erro-cpf">
            <span class="error" id="erro-cpf" aria-live="polite"></span>
          </div>
          
          <div class="form-group">
            <label for="nascimento">Data de nascimento <span aria-hidden="true">*</span></label>
            <input type="date" id="nascimento" name="nascimento" required aria-describedby="erro-nascimento">
            <span class="error" id="erro-nascimento" aria-live="polite"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="email">E-mail <span aria-hidden="true">*</span></label>
          <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com" aria-describedby="erro-email">
          <span class="error" id="erro-email" aria-live="polite"></span>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="telefone">Telefone/WhatsApp <span aria-hidden="true">*</span></label>
            <input type="tel" id="telefone" name="telefone" required placeholder="(41) 99999-9999" maxlength="15" inputmode="numeric" aria-describedby="erro-telefone">
            <span class="error" id="erro-telefone" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label>Gênero</label>
            <div class="gender-group" role="radiogroup" aria-labelledby="genero-label">
              <label><input type="radio" name="genero" value="M"> Masculino</label>
              <label><input type="radio" name="genero" value="F"> Feminino</label>
              <label><input type="radio" name="genero" value="O"> Outro</label>
              <label><input type="radio" name="genero" value="N" checked> Prefiro não informar</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="estado">Estado onde reside</label>
          <select id="estado" name="estado">
            <option value="">Selecione...</option>
            <!-- lista mantida igual, mas com PR selected -->
            <option value="PR" selected>Paraná</option>
            <!-- ... demais estados ... -->
          </select>
        </div>

        <div class="form-group">
          <label class="lgpd-label">
            <input type="checkbox" id="lgpd" name="lgpd" required>
            <span>Li e concordo com a <a href="#" target="_blank" rel="noopener">Política de Privacidade</a> e autorizo o tratamento dos meus dados conforme a LGPD.</span>
          </label>
          <span class="error" id="erro-lgpd" aria-live="polite"></span>
        </div>

        <div id="mensagem" style="display:none;"></div>

        <button type="submit" id="btn-submit" disabled>Cadastrar Cliente</button>
      </form>
    </div>

    <div class="footer">
      Sistema de Cadastro • © 2026
    </div>
  </div>

  <script>
    // ─── Máscaras ────────────────────────────────────────────────
    function aplicarMascaraCPF(input) {
      let v = input.value.replace(/\D/g, '');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      input.value = v.slice(0, 14);
    }

    function aplicarMascaraTelefone(input) {
      let v = input.value.replace(/\D/g, '');
      if (v.length <= 10) {
        v = v.replace(/^(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
      } else {
        v = v.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
      }
      input.value = v.slice(0, 15);
    }

    // ─── Validações ──────────────────────────────────────────────
    function validarCPF(str) {
      const cpf = str.replace(/\D/g, '');
      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
      
      let soma = 0;
      for (let i = 0; i < 9; i++) soma += parseInt(cpf[i]) * (10 - i);
      let resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf[9])) return false;

      soma = 0;
      for (let i = 0; i < 10; i++) soma += parseInt(cpf[i]) * (11 - i);
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      return resto === parseInt(cpf[10]);
    }

    function idadeMinima(data) {
      if (!data) return false;
      const hoje = new Date();
      const nasc = new Date(data);
      let idade = hoje.getFullYear() - nasc.getFullYear();
      const m = hoje.getMonth() - nasc.getMonth();
      if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
      return idade >= 16;
    }

    function validarEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // ─── Mostrar mensagem ────────────────────────────────────────
    function mostrarMensagem(texto, tipo = 'success') {
      const el = document.getElementById('mensagem');
      el.textContent = texto;
      el.className = tipo === 'success' ? 'success-msg' : 'error-msg';
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 7000);
    }

    // ─── Validação em tempo real + submit ────────────────────────
    const form = document.getElementById('cadastro-form');
    const btn = document.getElementById('btn-submit');

    function validarFormulario(mostrarErros = false) {
      let valido = true;

      // Nome
      const nome = document.getElementById('nome');
      const erroNome = document.getElementById('erro-nome');
      if (nome.value.trim().length < 3) {
        if (mostrarErros) erroNome.textContent = 'Nome muito curto (mín. 3 caracteres)';
        valido = false;
      } else erroNome.textContent = '';

      // CPF
      const cpf = document.getElementById('cpf');
      const erroCpf = document.getElementById('erro-cpf');
      if (!validarCPF(cpf.value)) {
        if (mostrarErros) erroCpf.textContent = 'CPF inválido';
        valido = false;
      } else erroCpf.textContent = '';

      // Nascimento
      const nasc = document.getElementById('nascimento');
      const erroNasc = document.getElementById('erro-nascimento');
      if (!idadeMinima(nasc.value)) {
        if (mostrarErros) erroNasc.textContent = 'Idade mínima permitida: 16 anos';
        valido = false;
      } else erroNasc.textContent = '';

      // Email
      const email = document.getElementById('email');
      const erroEmail = document.getElementById('erro-email');
      if (!validarEmail(email.value)) {
        if (mostrarErros) erroEmail.textContent = 'E-mail inválido';
        valido = false;
      } else erroEmail.textContent = '';

      // Telefone
      const tel = document.getElementById('telefone');
      const erroTel = document.getElementById('erro-telefone');
      const telLimpo = tel.value.replace(/\D/g, '');
      if (telLimpo.length < 10 || telLimpo.length > 11) {
        if (mostrarErros) erroTel.textContent = 'Telefone inválido (10 ou 11 dígitos)';
        valido = false;
      } else erroTel.textContent = '';

      // LGPD
      const lgpd = document.getElementById('lgpd');
      const erroLgpd = document.getElementById('erro-lgpd');
      if (!lgpd.checked) {
        if (mostrarErros) erroLgpd.textContent = 'Você precisa aceitar a política de privacidade';
        valido = false;
      } else erroLgpd.textContent = '';

      btn.disabled = !valido;
      return valido;
    }

    // Eventos de input (validação em tempo real)
    ['input', 'change', 'blur'].forEach(evt => {
      form.addEventListener(evt, () => validarFormulario(false), true);
    });

    // Máscaras
    document.getElementById('cpf').addEventListener('input', e => aplicarMascaraCPF(e.target));
    document.getElementById('telefone').addEventListener('input', e => aplicarMascaraTelefone(e.target));

    // Limite dinâmico da data (16 anos completos)
    const hoje = new Date();
    const maxDate = new Date(hoje.getFullYear() - 16, hoje.getMonth(), hoje.getDate() - 1);
    document.getElementById('nascimento').setAttribute('max', maxDate.toISOString().split('T')[0]);

    // Submit
    form.addEventListener('submit', e => {
      e.preventDefault();
      if (validarFormulario(true)) {
        mostrarMensagem('Cadastro realizado com sucesso! (simulação)', 'success');
        form.reset();
        btn.disabled = true;
        // Aqui você colocaria fetch() para enviar ao backend
      } else {
        mostrarMensagem('Por favor, corrija os campos destacados.', 'error');
      }
    });

    // Validação inicial + botão começa desabilitado
    validarFormulario(false);
  </script>

</body>
</html>
