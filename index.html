<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Cliente</title>
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      overflow: hidden;
    }
    .header {
      background: #4f46e5;
      color: white;
      padding: 24px;
      text-align: center;
    }
    .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 0.95rem; }
    .form-container { padding: 32px 28px; }
    .form-group { margin-bottom: 22px; position: relative; }
    label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-weight: 500;
      font-size: 0.95rem;
    }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .error { 
      color: #dc2626; 
      font-size: 0.85rem; 
      margin-top: 6px; 
      display: block; 
    }
    .success-msg, .error-msg {
      padding: 16px;
      margin: 16px 0;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
    }
    .success-msg { background: #d1fae5; color: #065f46; }
    .error-msg   { background: #fee2e2; color: #991b1b; }
    .row { display: flex; gap: 20px; }
    .row > div { flex: 1; }
    .gender-group {
      display: flex;
      gap: 24px;
      margin-top: 8px;
    }
    .gender-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      cursor: pointer;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.25s;
    }
    button:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79,70,229,0.3);
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 0.9rem;
      border-top: 1px solid #f3f4f6;
    }
    @media (max-width: 480px) {
      .row { flex-direction: column; gap: 22px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Cadastro de Cliente</h1>
      <p>Preencha os dados corretamente</p>
    </div>

    <div class="form-container">
      <form id="cadastro-form" novalidate>

        <div class="form-group">
          <label for="nome">Nome completo *</label>
          <input type="text" id="nome" name="nome" required placeholder="Ex: João Silva Santos" minlength="3">
          <span class="error" id="erro-nome"></span>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00" maxlength="14">
            <span class="error" id="erro-cpf"></span>
          </div>
          
          <div class="form-group">
            <label for="nascimento">Data de nascimento *</label>
            <input type="date" id="nascimento" name="nascimento" required>
            <span class="error" id="erro-nascimento"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="email">E-mail *</label>
          <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com">
          <span class="error" id="erro-email"></span>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="telefone">Telefone / WhatsApp *</label>
            <input type="tel" id="telefone" name="telefone" required placeholder="(41) 99999-9999" maxlength="15">
            <span class="error" id="erro-telefone"></span>
          </div>

          <div class="form-group">
            <label>Gênero</label>
            <div class="gender-group">
              <label><input type="radio" name="genero" value="M"> Masculino</label>
              <label><input type="radio" name="genero" value="F"> Feminino</label>
              <label><input type="radio" name="genero" value="O"> Outro</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="estado">Estado onde reside</label>
          <select id="estado" name="estado">
            <option value="">Selecione...</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR" selected>Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
          </select>
        </div>

        <div id="mensagem" style="display:none;"></div>

        <button type="submit">Cadastrar Cliente</button>
      </form>
    </div>

    <div class="footer">
      Sistema de Cadastro • © 2026
    </div>
  </div>

  <script>
    // Máscaras
    function mascaraCPF(el) {
      let valor = el.value.replace(/\D/g, '');
      if (valor.length > 11) valor = valor.slice(0,11);
      if (valor.length <= 11) {
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      }
      el.value = valor;
    }

    function mascaraTelefone(el) {
      let valor = el.value.replace(/\D/g, '');
      if (valor.length > 11) valor = valor.slice(0,11);
      
      if (valor.length <= 10) {
        // fixo ou antigo 9 dígitos sem 9 inicial
        valor = valor.replace(/^(\d{2})(\d)/g, '($1) $2');
        valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
      } else {
        // celular com 9 dígitos
        valor = valor.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
        if (valor.length > 15) valor = valor.slice(0,15);
      }
      el.value = valor;
    }

    // Validação de CPF (algoritmo oficial)
    function validarCPF(cpf) {
      cpf = cpf.replace(/\D/g, '');
      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

      let soma = 0;
      for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf.charAt(i)) * (10 - i);
      }
      let resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf.charAt(9))) return false;

      soma = 0;
      for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf.charAt(i)) * (11 - i);
      }
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf.charAt(10))) return false;

      return true;
    }

    // Validação de idade mínima (~16 anos)
    function idadeMinima(dataNasc) {
      if (!dataNasc) return false;
      const hoje = new Date();
      const nasc = new Date(dataNasc);
      let idade = hoje.getFullYear() - nasc.getFullYear();
      const mes = hoje.getMonth() - nasc.getMonth();
      if (mes < 0 || (mes === 0 && hoje.getDate() < nasc.getDate())) idade--;
      return idade >= 16;
    }

    // Mostrar mensagem
    function mostrarMensagem(texto, tipo = 'success') {
      const msgEl = document.getElementById('mensagem');
      msgEl.textContent = texto;
      msgEl.className = tipo === 'success' ? 'success-msg' : 'error-msg';
      msgEl.style.display = 'block';
      setTimeout(() => { msgEl.style.display = 'none'; }, 6000);
    }

    // Event listeners
    document.getElementById('cpf').addEventListener('input', function() {
      mascaraCPF(this);
      document.getElementById('erro-cpf').textContent = '';
    });

    document.getElementById('telefone').addEventListener('input', function() {
      mascaraTelefone(this);
      document.getElementById('erro-telefone').textContent = '';
    });

    document.getElementById('cadastro-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      let valido = true;
      const erros = document.querySelectorAll('.error');
      erros.forEach(el => el.textContent = '');

      // Nome
      const nome = document.getElementById('nome').value.trim();
      if (nome.length < 3) {
        document.getElementById('erro-nome').textContent = 'Nome muito curto';
        valido = false;
      }

      // CPF
      const cpf = document.getElementById('cpf').value;
      if (!validarCPF(cpf)) {
        document.getElementById('erro-cpf').textContent = 'CPF inválido';
        valido = false;
      }

      // Data de nascimento
      const nasc = document.getElementById('nascimento').value;
      if (!idadeMinima(nasc)) {
        document.getElementById('erro-nascimento').textContent = 'Idade mínima não permitida';
        valido = false;
      }

      // Email básico
      const email = document.getElementById('email').value;
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('erro-email').textContent = 'E-mail inválido';
        valido = false;
      }

      // Telefone (só verifica se tem pelo menos 10 dígitos limpos)
      const telLimpo = document.getElementById('telefone').value.replace(/\D/g, '');
      if (telLimpo.length < 10) {
        document.getElementById('erro-telefone').textContent = 'Telefone incompleto';
        valido = false;
      }

      if (valido) {
        mostrarMensagem('Cadastro realizado com sucesso! (simulação)', 'success');
        this.reset();
      } else {
        mostrarMensagem('Por favor, corrija os erros destacados.', 'error');
      }
    });
  </script>

</body>
</html>
