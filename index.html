<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Minha Aplicação</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
    }

    .login-header {
      background: #4f46e5;
      color: white;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .login-header h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .form-container {
      padding: 2.5rem 2.5rem 2rem;
    }

    .form-group {
      margin-bottom: 1.6rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.6rem;
      color: #4b5563;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .form-control {
      width: 100%;
      padding: 0.95rem 1.1rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .password-group {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-12%);
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: #6b7280;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.4rem 0 2rem;
      font-size: 0.9rem;
    }

    .remember label {
      color: #4b5563;
      user-select: none;
    }

    .forgot a {
      color: #6366f1;
      text-decoration: none;
    }

    .forgot a:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-login:hover {
      background: #4338ca;
      transform: translateY(-2px);
    }

    .signup-link {
      text-align: center;
      margin-top: 1.8rem;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .signup-link a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 2rem 1.6rem 1.6rem;
      }
      
      .login-header {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h1>Bem-vindo</h1>
      <p>Faça login para continuar</p>
    </div>

    <div class="form-container">
      <form>

        <div class="form-group">
          <label for="email">E-mail</label
