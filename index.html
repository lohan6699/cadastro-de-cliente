<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Seu Site</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    .login-header {
      background: #4f46e5;
      color: white;
      padding: 30px 40px;
      text-align: center;
    }

    .login-header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .login-header p {
      opacity: 0.9;
      font-size: 15px;
    }

    .form-container {
      padding: 40px 35px 30px;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #4b5563;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.25s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-12%);
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #6b7280;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0 28px;
      font-size: 14px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4b5563;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: #6366f1;
    }

    .forgot a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot a:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-login:hover {
      background: #4f46e5;
      transform: translateY(-2px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      color: #6b7280;
      font-size: 15px;
    }

    .signup-link a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 30px 25px 25px;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    
    <div class="login-header">
      <h1>Bem-vindo de volta!</h1>
      <p>Faça login para continuar</p>
    </div>

    <div class="form-container">
      <form>

        <div class="form-group">
          <label for="email">E-mail ou usuário</label>
          <input type="text" id="email" placeholder="seuemail@exemplo.com" required>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" class="password-toggle">👁️</button>
          </div>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" id="remember">
            Lembrar de mim
          </label>
          <span class="forgot">
            <a href="#">Esqueceu a senha?</a>
          </span>
        </div>

        <button type="submit" class="btn-login">Entrar</button>

      </form>

      <div class="signup-link">
        Ainda não tem conta? <a href="#">Criar conta</a>
      </div>
    </div>

  </div>

  <!-- JavaScript simples só pro olho da senha -->
  <script>
    const toggleBtn = document.querySelector('.password-toggle');
    const passwordInput = document.querySelector('#password');

    toggleBtn.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      
      // Muda o emoji (opcional)
      toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
    });
  </script>

</body>
</html>
