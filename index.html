<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Meu Sistema</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e40af 0%, #312e81 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px -12px rgba(0,0,0,0.35);
    }

    .header {
      background: linear-gradient(to right, #1d4ed8, #3b82f6);
      color: white;
      padding: 2.5rem 1.8rem;
      text-align: center;
    }

    .header h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .form {
      padding: 2.2rem 1.8rem 2.5rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #374151;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.2rem 0 1.8rem;
      font-size: 0.9rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #4b5563;
      user-select: none;
    }

    .remember input {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .forgot a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot a:hover {
      text-decoration: underline;
      color: #1d4ed8;
    }

    .btn-login {
      width: 100%;
      padding: 0.95rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-login:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .signup-link {
      text-align: center;
      margin-top: 1.8rem;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .signup-link a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-container {
        max-width: 100%;
      }
      .form, .header {
        padding-left: 1.4rem;
        padding-right: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    
    <div class="header">
      <h1>Bem-vindo de volta</h1>
      <p>Faça login para continuar no sistema</p>
    </div>

    <form class="form" id="loginForm">
      
      <div class="input-group">
        <label for="usuario">Usuário ou e-mail</label>
        <input 
          type="text" 
          id="usuario" 
          name="usuario"
          placeholder="seu.nome@exemplo.com" 
          required 
          autofocus
          autocomplete="username email"
        >
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input 
          type="password" 
          id="senha" 
          name="senha"
          placeholder="••••••••" 
          required
          autocomplete="current-password"
        >
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" id="lembrar" name="lembrar">
          Manter conectado
        </label>
        <span class="forgot">
          <a href="#">Esqueceu a senha?</a>
        </span>
      </div>

      <button type="submit" class="btn-login">Entrar</button>

    </form>

    <div class="signup-link">
      Ainda não tem conta? <a href="#">Criar conta gratuita</a>
    </div>

  </div>

  <!-- JavaScript opcional - só para demonstração -->
  <script>
    // Impede envio real do formulário (apenas exemplo)
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const senha = document.getElementById('senha').value;
      
      if (usuario && senha) {
        alert('Login simulado com sucesso!\n\nUsuário: ' + usuario);
      }
    });
  </script>

</body>
</html>>
